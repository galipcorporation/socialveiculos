# Fly.io — Social Veículos API (FastAPI)
# Deploy: cd apps/api && fly deploy
app = "socialveiculos-api"
primary_region = "gru"  # São Paulo

[build]
  dockerfile = "Dockerfile"

[env]
  API_HOST = "0.0.0.0"
  API_PORT = "8000"
  API_DEBUG = "false"
  APP_ENV = "production"
  # Worker roda no mesmo app privado do Fly (rede .internal).
  WHATSAPP_WORKER_URL = "http://socialveiculos-worker.internal:8090"
  API_BASE_URL = "https://socialveiculos-api.fly.dev"
  # O app mobile (React Native) não é origem HTTP e ignora CORS; estas origens
  # cobrem os fronts web na Vercel + dev local.
  CORS_ORIGINS = "https://socialveiculos-gestor.vercel.app,https://socialveiculos-vitrine.vercel.app,https://socialveiculos-admin.vercel.app,https://socialveiculos-site.vercel.app,http://localhost:5173,http://localhost:5174,http://localhost:8081"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = false   # backend tem worker de marketing + WebSockets: NÃO parar
  auto_start_machines = true
  min_machines_running = 1

  [http_service.concurrency]
    type = "requests"
    soft_limit = 200
    hard_limit = 250

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
